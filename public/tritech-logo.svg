<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Tri-Tech Invoice</title>
  <defs>
    <linearGradient id="grad" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="12" y="12" width="136" height="136" rx="36" fill="url(#grad)" filter="url(#glow)" />
  <rect x="52" y="52" width="56" height="56" rx="18" fill="#f8fafc" />
</svg>
